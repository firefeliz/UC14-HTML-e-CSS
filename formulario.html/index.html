<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Informações básicas</h1>
    <label for="Nome">Nome completo:</label>
    <input type="text" name="Nome completo" >
<br>
    <label for="Email">Coloque o seu email aqui:</label>
    <input type="email" name="Email" >
    <br>
    <label for="Senha">Digite sua senha aqui:</label>
    <input type="password" name="senha" >
    <h1>Dados pessoais</h1>
    <label for="Data">Data de nasciemnto</label>
    <input type="date" name="Data de nascimento">
    <br>
    <label for="Idade">Idade</label>
    <input type="number" name="Idade" min="0" max="120">
    <label for="Cor">Cor favorita</label>
    <input type="color" name="Cor" >
    <br>
    <label for="Genero">Gênero</label>
    <input type="radio" name="Genero" >MASCULINO
    <input type="radio" name="Genero" >FEMININO
    <input type="radio" name="Genero" >OUTRO
    <br>
    <label for="Cor">Cor de pele</label>
    <input type="radio" name="Cor" >NEGRO
    <input type="radio" name="Cor" >BRANCO
    <input type="radio" name="Cor" >PARDO
    <input type="radio" name="Cor" >INDIGENA
    <input type="radio" name="Cor" >OUTRO
    <h1>Preferências</h1>
    <h4>Gostos/hobbies</h4>
    <label for="Esportes">Esportes</label>
    <input type="checkbox" name="Esportes" >FUTEBOL
    <input type="checkbox" name="Esportes" >BASQUETE
    <input type="checkbox" name="Esportes" >VOLEI
    <input type="checkbox" name="Esportes" >OUTRO
    <br>
    <label for="Gostos">Gostos</label>
    <input type="checkbox" name="Gostos" >MUSICA
    <input type="checkbox" name="Gostos" >VIDEO GAMES
    <input type="checkbox" name="Gostos" >ARTE
    <input type="checkbox" name="Gostos" >OUTRO
    <h1>Face id</h1>
    <label for="Face">Coloque uma foto sua aqui:</label>
    <input type="file" name="Face" >
    <h1>Verificação obrigatória</h1>
    <label for="button">Clique aqui para ver se você não é um robô:</label>
    <input type="button" name="button" value="Clique">

</body>
</html>
